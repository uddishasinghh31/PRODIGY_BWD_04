spring.application.name=basic-rest-api
server.port=8080

# Load local credentials; this file must never go to GitHub.
spring.config.import=optional:file:./.env[.properties]

# MySQL connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Let Flyway create/manage schema; Hibernate only validates it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
logging.level.org.flywaydb=DEBUG
jwt.secret=yourSuperSecretKeyThatIsAtLeast32CharactersLongForHS256
jwt.expiration=86400000
spring.data.redis.host=localhost
spring.data.redis.port=6379